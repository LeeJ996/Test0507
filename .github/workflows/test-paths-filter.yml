name: Test Paths Filter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-paths-filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 必须加！用于对比文件变更

      # 核心：你的 fork 版本必须加 output: csv
      - name: Filter changed files
        id: filter
        uses: LeeJ996/paths-filter@master
        with:
          output: 'csv'  # 🔥 这一行是关键！不加不输出文件列表
          filters: |
            source:
              - 'src/**'
            docs:
              - '*.md'
            config:
              - '.github/**'

      # 打印结果
      - name: Show filter results
        run: |
          echo "✅ 源码文件是否变更: ${{ steps.filter.outputs.source }}"
          echo "✅ 文档文件是否变更: ${{ steps.filter.outputs.docs }}"
          echo "✅ 配置文件是否变更: ${{ steps.filter.outputs.config }}"
          echo "✅ 所有变更文件列表: ${{ steps.filter.outputs.files }}"
          echo "✅ 变更文件数量: ${{ steps.filter.outputs.count }}"
