name: Test Paths Filter (Official)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须，获取完整提交历史

      # 🔥 官方原版，100% 能打印文件列表
      - name: Filter changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          list-files: csv  # 输出文件列表（关键）
          filters: |
            source:
              - 'src/**'
            docs:
              - '*.md'
            config:
              - '.github/**'

      # ✅ 这里一定能输出！
      - name: Show results
        run: |
          echo "源码变更: ${{ steps.filter.outputs.source }}"
          echo "文档变更: ${{ steps.filter.outputs.docs }}"
          echo "配置变更: ${{ steps.filter.outputs.config }}"
          echo "变更文件列表: ${{ steps.filter.outputs.source_files }}"
          echo "所有变更文件: ${{ steps.filter.outputs.all_files }}"
          echo "变更数量: ${{ steps.filter.outputs.all_count }}"
